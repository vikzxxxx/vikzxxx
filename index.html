
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  #app { padding: 1.5rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); text-align: center; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); text-align: center; }
  #wheel-wrap { position: relative; width: 280px; height: 280px; }
  #wheel-canvas { border-radius: 50%; display: block; }
  #needle { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 28px solid var(--color-text-primary); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); z-index: 10; }
  #center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 60px; height: 60px; border-radius: 50%; background: var(--color-background-primary); border: 2px solid var(--color-border-secondary); font-size: 12px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; transition: background 0.15s; z-index: 11; }
  #center-btn:hover { background: var(--color-background-secondary); }
  #center-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .players { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
  .player-chip { font-size: 13px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .player-chip.active { border-color: transparent; font-weight: 500; }
  .add-player { display: flex; gap: 8px; align-items: center; }
  .add-player input { font-size: 13px; padding: 5px 10px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); width: 130px; outline: none; }
  .add-player button { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  #result-card { width: 100%; max-width: 340px; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); padding: 1.25rem; text-align: center; display: none; animation: popIn 0.3s ease; }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-type { font-size: 12px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .result-player { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 10px; }
  .result-question { font-size: 16px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; }
  .next-btn { margin-top: 1rem; font-size: 13px; padding: 7px 20px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .next-btn:hover { background: var(--color-background-secondary); }
  .turn-info { font-size: 13px; color: var(--color-text-secondary); }
</style>

<div id="app">
  <h2 class="sr-only">Truth or Dare Roulette game with a spinning wheel</h2>
  <h1>Truth or Dare Roulette</h1>
  <p class="subtitle">Spin the wheel — land on Truth or Dare!</p>

  <div class="players" id="player-list"></div>
  <div class="add-player">
    <input id="player-input" placeholder="Add player name..." maxlength="16" />
    <button id="add-btn">+ Add</button>
  </div>

  <div id="wheel-wrap">
    <div id="needle"></div>
    <canvas id="wheel-canvas" width="280" height="280"></canvas>
    <button id="center-btn">SPIN</button>
  </div>

  <div class="turn-info" id="turn-info"></div>
  <div id="result-card">
    <div class="result-type" id="result-type"></div>
    <div class="result-player" id="result-player"></div>
    <div class="result-question" id="result-question"></div>
    <button class="next-btn" id="next-btn">Next Turn</button>
  </div>
</div>

<script>
const TRUTHS = [
  "What's the most embarrassing thing that's happened to you?",
  "What's a secret talent you have that not many people know about?",
  "What's the silliest thing you've ever cried about?",
  "What's your most irrational fear?",
  "What's the worst gift you've ever received?",
  "Have you ever laughed so hard you cried? What caused it?",
  "What's one thing on your bucket list?",
  "What's your go-to karaoke song?",
  "What's a food you secretly love but are embarrassed to admit?",
  "What's the strangest dream you've ever had?",
  "Who was your celebrity crush growing up?",
  "What's the funniest word in any language you know?",
  "What's something you believed as a kid that turned out to be wrong?",
  "What's the most adventurous thing you've ever done?",
  "If you could live in any TV show world, which would you pick?",
  "What's a habit you wish you could break?",
  "What's the best piece of advice you've ever been given?",
  "What's the weirdest thing you've ever eaten?",
  "If animals could talk, which one do you think would be the rudest?",
  "What's your guilty pleasure TV show or movie?",
];

const DARES = [
  "Do your best impression of someone in this room!",
  "Speak in an accent of the group's choosing for the next 3 minutes.",
  "Do 10 jumping jacks right now!",
  "Say the alphabet backwards as fast as you can.",
  "Sing the first verse of your favorite song.",
  "Do your funniest dance move for 30 seconds.",
  "Tell a joke — it must make at least one person laugh.",
  "Text a friend a random compliment right now.",
  "Do your best robot impression for 1 minute.",
  "Make up a short poem about the person to your left.",
  "Imitate an animal of the group's choice until your next turn.",
  "Do 5 push-ups (or try your best!).",
  "Speak only in questions for the next 2 minutes.",
  "Draw a portrait of the person across from you in 60 seconds.",
  "Do your best moonwalk across the room.",
  "Let the group give you a silly nickname for the rest of the game.",
  "Say something nice about every person in the room.",
  "Do your best superhero landing pose.",
  "Whisper everything you say for the next 2 minutes.",
  "Act out a movie scene without words until someone guesses it.",
];

const SEGMENTS = 12;
const COLORS_TRUTH = ['#AFA9EC', '#EEEDFE', '#7F77DD'];
const COLORS_DARE = ['#5DCAA5', '#E1F5EE', '#1D9E75'];
const TEXT_TRUTH = '#3C3489';
const TEXT_DARE = '#085041';

let players = ['Player 1', 'Player 2'];
let currentPlayerIdx = 0;
let spinning = false;
let angle = 0;

const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const centerBtn = document.getElementById('center-btn');
const resultCard = document.getElementById('result-card');
const resultType = document.getElementById('result-type');
const resultPlayer = document.getElementById('result-player');
const resultQuestion = document.getElementById('result-question');
const turnInfo = document.getElementById('turn-info');

function getSegmentLabel(i) {
  return i % 2 === 0 ? 'TRUTH' : 'DARE';
}

function drawWheel(rot) {
  const cx = 140, cy = 140, r = 135;
  const segAngle = (2 * Math.PI) / SEGMENTS;
  ctx.clearRect(0, 0, 280, 280);

  for (let i = 0; i < SEGMENTS; i++) {
    const start = rot + i * segAngle;
    const end = start + segAngle;
    const isTruth = i % 2 === 0;
    const palette = isTruth ? COLORS_TRUTH : COLORS_DARE;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = palette[i % palette.length];
    ctx.fill();
    ctx.strokeStyle = 'var(--color-background-primary, #fff)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + segAngle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = isTruth ? TEXT_TRUTH : TEXT_DARE;
    ctx.font = '500 11px sans-serif';
    ctx.fillText(isTruth ? 'TRUTH' : 'DARE', r - 10, 4);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 32, 0, 2 * Math.PI);
  ctx.fillStyle = 'var(--color-background-primary, #fff)';
  ctx.fill();
  ctx.strokeStyle = 'var(--color-border-secondary, #ccc)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function spinWheel() {
  if (spinning || players.length === 0) return;
  spinning = true;
  resultCard.style.display = 'none';
  centerBtn.disabled = true;
  centerBtn.textContent = '...';

  const totalRot = (Math.random() * 6 + 8) * Math.PI * 2;
  const duration = 3500;
  const start = performance.now();
  const startAngle = angle;

  function ease(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    angle = startAngle + totalRot * ease(t);
    drawWheel(angle);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      centerBtn.disabled = false;
      centerBtn.textContent = 'SPIN';
      showResult();
    }
  }
  requestAnimationFrame(animate);
}

function showResult() {
  const segAngle = (2 * Math.PI) / SEGMENTS;
  const normalized = ((-(angle) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const landed = Math.floor(normalized / segAngle) % SEGMENTS;
  const isTruth = landed % 2 === 0;

  const player = players[currentPlayerIdx];
  const pool = isTruth ? TRUTHS : DARES;
  const q = pool[Math.floor(Math.random() * pool.length)];

  resultType.textContent = isTruth ? 'TRUTH' : 'DARE';
  resultType.style.color = isTruth ? TEXT_TRUTH : TEXT_DARE;
  resultPlayer.textContent = player + "'s turn";
  resultQuestion.textContent = q;
  resultCard.style.display = 'block';

  updateTurnInfo();
}

function nextTurn() {
  currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
  resultCard.style.display = 'none';
  updateTurnInfo();
}

function updateTurnInfo() {
  if (players.length === 0) { turnInfo.textContent = 'Add players to start!'; return; }
  turnInfo.textContent = 'Up next: ' + players[currentPlayerIdx];
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  const chipColors = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517'];
  players.forEach((p, i) => {
    const chip = document.createElement('span');
    chip.className = 'player-chip' + (i === currentPlayerIdx ? ' active' : '');
    chip.textContent = p;
    if (i === currentPlayerIdx) {
      chip.style.background = chipColors[i % chipColors.length];
      chip.style.color = '#fff';
    }
    chip.onclick = () => {
      const newName = prompt('Rename player:', p);
      if (newName && newName.trim()) { players[i] = newName.trim().slice(0,16); renderPlayers(); updateTurnInfo(); }
    };
    list.appendChild(chip);

    const del = document.createElement('span');
    del.textContent = '×';
    del.style.cssText = 'font-size:11px;color:var(--color-text-secondary);cursor:pointer;margin-left:-4px;';
    del.onclick = (e) => { e.stopPropagation(); players.splice(i,1); if(currentPlayerIdx>=players.length) currentPlayerIdx=0; renderPlayers(); updateTurnInfo(); };
    list.appendChild(del);
  });
  updateTurnInfo();
}

document.getElementById('add-btn').onclick = () => {
  const inp = document.getElementById('player-input');
  const name = inp.value.trim().slice(0,16);
  if (name && players.length < 8) { players.push(name); inp.value = ''; renderPlayers(); }
};
document.getElementById('player-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('add-btn').click();
});
centerBtn.onclick = spinWheel;
document.getElementById('next-btn').onclick = nextTurn;

drawWheel(0);
renderPlayers();
</script>
